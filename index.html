<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldMaster • 2026</title>
<script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
:root { --bg:#070c1a; --accent:#00aaff; --accent2:#00ffcc; --text:#c8d8f0; --card:#0f1a2e; --border:#1e3050; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; min-height:100dvh; }
.header { background:linear-gradient(135deg,#070c1a,#0d1528); padding:14px 16px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #1e3050; position:sticky; top:0; z-index:100; }
.header-logo { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:900; letter-spacing:4px; background:linear-gradient(90deg,#00aaff,#00ffcc); -webkit-background-clip:text; color:transparent; }
.tabs { display:flex; overflow-x:auto; background:#0d1528; border-bottom:1px solid #1e3050; padding:8px 0; gap:6px; }
.tab { padding:12px 20px; font-weight:700; font-size:13px; letter-spacing:1.5px; text-transform:uppercase; white-space:nowrap; border-bottom:3px solid transparent; transition:all 0.3s; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.page { display:none; padding:20px 16px 80px; }
.page.active { display:block; }
.card { background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:16px; padding:16px; }
.table { width:100%; border-collapse:collapse; font-size:13px; }
.table td, .table th { border:1px solid #1e3050; padding:8px; text-align:left; }
.table th { background:#0d1528; color:var(--accent2); }
.input-cell { width:100%; background:transparent; border:none; color:var(--text); font-size:13px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">FIELD<span>MASTER</span></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showPage('home')">🏠 Início</button>
  <button class="tab" onclick="showPage('equip')">📸 Equipamentos</button>
  <button class="tab" onclick="showPage('manuais')">📖 Manuais</button>
  <button class="tab" onclick="showPage('diagnostico')">🔍 Diagnóstico IA</button>
  <button class="tab" onclick="showPage('backup')">💾 Backup</button>
  <button class="tab" onclick="showPage('glossario')">📖 Glossário</button>
  <button class="tab" onclick="showAdminTab()">🔐 Admin</button>
</div>

<!-- BACKUP -->
<div class="page active" id="page-backup">
  <h2 style="color:#00ffcc;margin-bottom:16px">💾 Backup Peak 150</h2>
  <div style="margin-bottom:16px">
    <label style="color:#00ffcc;display:block;margin-bottom:8px">Nome do Técnico:</label>
    <input id="tecnicoNome" placeholder="Digite o nome do técnico" style="width:100%;padding:14px;background:#0f1a2e;border:1px solid #1e3050;border-radius:8px;color:#fff">
  </div>
  <div class="card">
    <table class="table" id="backupTable"></table>
  </div>
  <button onclick="salvarEEnviarBackup()" style="width:100%;padding:18px;background:linear-gradient(#00aaff,#00ffcc);color:#000;font-weight:900;border:none;border-radius:12px">💾 Salvar e Enviar</button>
</div>

<!-- ADMIN -->
<div class="page" id="page-admin">
  <h2 style="color:#00ffcc;margin-bottom:16px">🔐 Admin - Relatórios Recebidos</h2>
  <div id="admin-list"></div>
</div>

<script>
// ==================== BANCO DE DADOS ====================
const db = new Dexie('FieldMasterDB');
db.version(1).stores({ backups: '++id, timestamp, tecnico, data' });

// ==================== BACKUP ====================
function carregarBackupTable() {
  const table = document.getElementById('backupTable');
  table.innerHTML = `
    <tr><th>Parâmetro</th><th>Valor</th></tr>
    <tr><td>ROTAÇÃO NOMINAL</td><td><input class="input-cell" value="OK"></td></tr>
    <tr><td>Speed Readout #1</td><td><input class="input-cell" value="5333.00 Hz"></td></tr>
    <tr><td>Speed Readout #2</td><td><input class="input-cell" value="10000.0"></td></tr>
  `;
}
carregarBackupTable();

window.salvarEEnviarBackup = async function() {
  const tecnico = document.getElementById('tecnicoNome').value.trim();
  if (!tecnico) return alert("Digite o nome do técnico!");

  await db.backends.add({
    timestamp: Date.now(),
    tecnico: tecnico,
    data: "Backup Peak 150 salvo"
  });

  alert(`✅ Relatório salvo e enviado para o Admin!\nTécnico: ${tecnico}`);
  document.getElementById('tecnicoNome').value = '';

  // Atualiza automaticamente a aba Admin se ela estiver aberta
  if (document.getElementById('page-admin').classList.contains('active')) {
    carregarBackupsAdmin();
  }
};

// ==================== ADMIN ====================
window.showAdminTab = function() {
  const senha = prompt("🔐 Senha de Administrador:");
  if (senha !== "1234") return alert("❌ Senha incorreta!");
  showPage('admin');
  carregarBackupsAdmin();
};

async function carregarBackupsAdmin() {
  const container = document.getElementById('admin-list');
  container.innerHTML = '';
  const backups = await db.backends.orderBy('timestamp').reverse().toArray();

  if (backups.length === 0) {
    container.innerHTML = '<div class="card" style="text-align:center;padding:40px;color:#7a9bc0">Nenhum relatório recebido ainda.</div>';
    return;
  }

  backups.forEach(b => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <strong>${b.tecnico}</strong> — ${new Date(b.timestamp).toLocaleString('pt-BR')}<br>
      <button onclick="baixarPDF(${b.id});event.stopImmediatePropagation()" 
              style="margin-top:12px;background:#00aaff;color:#000;padding:10px 20px;border:none;border-radius:8px">📄 Baixar PDF</button>
    `;
    container.appendChild(div);
  });
}

window.baixarPDF = async function(id) {
  const backup = await db.backends.get(id);
  if (!backup) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(18);
  doc.text("FieldMaster - Relatório", 20, 20);
  doc.setFontSize(12);
  doc.text(`Técnico: ${backup.tecnico}`, 20, 40);
  doc.text(`Data: ${new Date(backup.timestamp).toLocaleString('pt-BR')}`, 20, 50);
  doc.save(`Relatorio_${backup.tecnico}_${new Date(backup.timestamp).toISOString().slice(0,10)}.pdf`);
};

// ==================== NAVEGAÇÃO ====================
window.showPage = function(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById('page-' + id);
  if (page) page.classList.add('active');
};

// Inicialização
carregarBackupTable();
console.log("✅ Aba Admin agora recebe os relatórios da aba Backup corretamente");
</script>
</body>
</html>
