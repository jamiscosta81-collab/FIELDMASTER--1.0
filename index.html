<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldMaster</title>
<script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body { font-family: Arial, sans-serif; background: #0a0f1f; color: #ddd; margin:0; padding:0; }
.header { background:#111; padding:15px; text-align:center; font-size:24px; font-weight:bold; }
.tabs { display:flex; overflow-x:auto; background:#1a1a2e; padding:10px; gap:5px; }
.tab { padding:12px 20px; background:#16213e; border:none; color:white; border-radius:8px; white-space:nowrap; }
.tab.active { background:#00aaff; color:black; }
.page { display:none; padding:20px; }
.page.active { display:block; }
.card { background:#16213e; padding:15px; margin:10px 0; border-radius:8px; }
button { padding:12px; margin:10px 0; width:100%; background:#00aaff; color:black; border:none; border-radius:8px; font-weight:bold; }
</style>
</head>
<body>

<div class="header">FIELDMASTER</div>

<div class="tabs">
  <button class="tab active" onclick="showPage('backup')">💾 Backup</button>
  <button class="tab" onclick="showPage('admin')">🔐 Admin</button>
</div>

<!-- BACKUP -->
<div class="page active" id="page-backup">
  <h2>Backup Peak 150</h2>
  <input id="tecnico" placeholder="Nome do Técnico" style="width:100%;padding:12px;margin:10px 0;background:#1a1a2e;border:none;color:white;border-radius:8px;">
  <button onclick="salvarBackup()">Salvar e Enviar para Admin</button>
</div>

<!-- ADMIN -->
<div class="page" id="page-admin">
  <h2>🔐 Admin - Relatórios Recebidos</h2>
  <div id="listaAdmin"></div>
</div>

<script>
const db = new Dexie('FieldMasterDB');
db.version(1).stores({ backups: '++id, timestamp, tecnico' });

window.showPage = function(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
};

window.salvarBackup = async function() {
  const tecnico = document.getElementById('tecnico').value.trim();
  if (!tecnico) return alert("Digite o nome do técnico!");

  await db.backends.add({
    timestamp: Date.now(),
    tecnico: tecnico
  });

  alert("Relatório enviado para o Admin!");
  document.getElementById('tecnico').value = "";
  carregarAdmin();   // Atualiza imediatamente
};

async function carregarAdmin() {
  const lista = document.getElementById('listaAdmin');
  lista.innerHTML = "";

  const backups = await db.backends.orderBy('timestamp').reverse().toArray();

  if (backups.length === 0) {
    lista.innerHTML = "<p style='color:#888;text-align:center'>Nenhum relatório recebido ainda.</p>";
    return;
  }

  backups.forEach(b => {
    const div = document.createElement('div');
    div.className = "card";
    div.innerHTML = `
      <strong>${b.tecnico}</strong><br>
      ${new Date(b.timestamp).toLocaleString('pt-BR')}
      <button onclick="baixarPDF(${b.id})" style="margin-top:10px">Baixar PDF</button>
    `;
    lista.appendChild(div);
  });
}

window.baixarPDF = function(id) {
  alert("PDF baixado (simulado) - ID: " + id);
};

carregarAdmin(); // Carrega ao abrir
</script>
</body>
</html>
