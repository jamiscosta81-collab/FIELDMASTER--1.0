<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldMaster • 2026</title>
<script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600;700&display=swap');
:root { --bg:#070c1a; --accent:#00aaff; --accent2:#00ffcc; --text:#c8d8f0; --card:#0f1a2e; --border:#1e3050; --glow:0 0 25px #00ffcc; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; min-height:100dvh; }
.header { background:linear-gradient(135deg,#070c1a,#0d1528); padding:16px 20px; display:flex; align-items:center; border-bottom:2px solid #00ffcc; position:sticky; top:0; z-index:1000; box-shadow:var(--glow); }
.header-logo { font-family:'Barlow Condensed',sans-serif; font-size:32px; font-weight:900; letter-spacing:6px; background:linear-gradient(90deg,#00aaff,#00ffcc); -webkit-background-clip:text; color:transparent; }
.tabs { display:flex; overflow-x:auto; background:#0d1528; padding:10px 0; gap:8px; border-bottom:1px solid #1e3050; }
.tab { padding:14px 24px; font-weight:700; font-size:14px; letter-spacing:1.5px; text-transform:uppercase; white-space:nowrap; border-bottom:4px solid transparent; transition:all 0.3s; }
.tab.active { color:#000; background:linear-gradient(#00aaff,#00ffcc); border-bottom:4px solid #00ffcc; box-shadow:var(--glow); }
.page { display:none; padding:24px 20px 100px; }
.page.active { display:block; }
.card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; margin-bottom:20px; }
.table { width:100%; border-collapse:collapse; font-size:14px; }
.table th, .table td { padding:12px; border:1px solid #1e3050; }
.table th { background:#1e3050; color:#00ffcc; }
.input-cell { width:100%; background:transparent; border:none; color:var(--text); }
.submenu { cursor:pointer; padding:16px; background:#1e3050; border-radius:12px; margin-bottom:12px; font-weight:700; display:flex; justify-content:space-between; align-items:center; }
.submenu-content { display:none; padding:16px; background:#16213e; border-radius:12px; }
.neon-btn { padding:18px; background:linear-gradient(90deg,#00aaff,#00ffcc); color:#000; font-weight:900; border:none; border-radius:12px; box-shadow:var(--glow); width:100%; margin-top:20px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">FIELD<span style="color:#00ffcc">MASTER</span></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showPage('backup')">💾 Backup</button>
  <button class="tab" onclick="showPage('admin')">🔐 Admin</button>
</div>

<!-- BACKUP -->
<div class="page active" id="page-backup">
  <h2 style="color:#00ffcc">💾 Backup Peak 150 - Handheld Replica</h2>
  
  <label style="color:#00ffcc;display:block;margin-bottom:8px">Nome do Técnico:</label>
  <input id="tecnicoNome" placeholder="Digite o nome do técnico" style="width:100%;padding:16px;background:#0f1a2e;border:2px solid #00ffcc;border-radius:12px;color:#fff;font-size:16px">

  <button id="btnSalvar" class="neon-btn">💾 Salvar e Enviar para o Técnico</button>
</div>

<!-- ADMIN -->
<div class="page" id="page-admin">
  <h2 style="color:#00ffcc">🔐 Admin - Relatórios Recebidos</h2>
  <div id="admin-list"></div>
</div>

<script>
// BANCO DE DADOS
const db = new Dexie('FieldMasterDB');
db.version(1).stores({ backups: '++id, timestamp, tecnico, data' });

// NAVEGAÇÃO
window.showPage = function(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (id === 'admin') carregarAdmin();
};

// === BOTÃO SALVAR COM addEventListener (CORRIGIDO) ===
document.getElementById('btnSalvar').addEventListener('click', async function() {
  console.log("🔥 Botão Salvar clicado!");

  const tecnico = document.getElementById('tecnicoNome').value.trim();
  console.log("Valor lido do campo:", tecnico);   // ← VEJA ISSO NO CONSOLE (F12)

  if (!tecnico) {
    alert("Digite o nome do técnico!");
    return;
  }

  await db.backends.add({
    timestamp: Date.now(),
    tecnico: tecnico,
    data: "Backup Peak 150 salvo"
  });

  alert(`✅ Relatório salvo e enviado!\nTécnico: ${tecnico}`);
  document.getElementById('tecnicoNome').value = "";

  carregarAdmin();   // Atualiza a aba Admin imediatamente
});

// CARREGAR ADMIN
async function carregarAdmin() {
  const container = document.getElementById('admin-list');
  container.innerHTML = '';
  const backups = await db.backends.orderBy('timestamp').reverse().toArray();

  if (backups.length === 0) {
    container.innerHTML = '<div class="card" style="text-align:center;padding:40px;color:#7a9bc0">Nenhum relatório ainda.<br>Salve na aba Backup.</div>';
    return;
  }

  backups.forEach(b => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <strong>${b.tecnico}</strong> — ${new Date(b.timestamp).toLocaleString('pt-BR')}<br>
      <button onclick="baixarPDF(${b.id})" style="margin-top:12px;background:#00aaff;color:#000;padding:10px 20px;border:none;border-radius:8px">📄 Baixar PDF</button>
    `;
    container.appendChild(div);
  });
}

window.baixarPDF = async function(id) {
  const backup = await db.backends.get(id);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text("FieldMaster - Backup", 20, 30);
  doc.text(`Técnico: ${backup.tecnico}`, 20, 50);
  doc.save(`Backup_${backup.tecnico}.pdf`);
};

// Inicialização
carregarAdmin();
console.log("✅ Código corrigido - abra F12 e teste o botão Salvar");
</script>
</body>
</html>
